<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Harlem Spartan SHOP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0d0d1a;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #ffffff;
      min-height: 100vh;
    }

    .navbar {
      background: #111127;
      border-bottom: 1px solid #1e1e3a;
      display: flex;
      align-items: center;
      padding: 0 32px;
      height: 65px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }

    .nav-logo-name { font-size: 20px; font-weight: 800; color: #ffffff; letter-spacing: 0.3px; }
    .nav-logo-name span { color: #e74c3c; }

    .shop-body { padding: 36px 32px; }

    .section-label {
      font-size: 12px;
      font-weight: 800;
      color: #e74c3c;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .section-divider {
      border: none;
      border-top: 1px solid #1e1e3a;
      margin: 40px 0 30px;
    }

    .section-block { margin-bottom: 10px; }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    @media (max-width: 1100px) { .cards-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 750px)  { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px)  { .cards-grid { grid-template-columns: 1fr; } }

    .item-card {
      background: #13132a;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #1e1e3a;
      transition: border-color 0.25s, transform 0.2s;
    }

    .item-card:hover { border-color: #c0392b; transform: translateY(-3px); }

    .item-img { width: 100%; height: 160px; object-fit: cover; display: block; }

    .item-img-placeholder {
      width: 100%;
      height: 160px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a0808 0%, #2a0a0a 50%, #0a0520 100%);
      font-size: 48px;
    }

    .item-info { padding: 14px 16px 16px; }

    .item-category {
      font-size: 11px;
      font-weight: 800;
      color: #e74c3c;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .item-name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    .item-price {
      font-size: 13px;
      font-weight: 700;
      color: #aaa;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .item-price span { color: #e74c3c; font-size: 14px; font-weight: 800; }

    .item-footer { display: flex; align-items: center; justify-content: flex-end; }

    .buy-btn {
      background: #c0392b;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }

    .buy-btn:hover { background: #a93226; transform: scale(1.03); }
    .buy-btn:active { transform: scale(0.97); }

    /* Badge HR */
    .hr-badge {
      display: inline-block;
      background: #c0392b22;
      border: 1px solid #c0392b;
      color: #e74c3c;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 1.5px;
      padding: 3px 10px;
      border-radius: 50px;
      margin-bottom: 6px;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d0d1a; }
    ::-webkit-scrollbar-thumb { background: #c0392b; border-radius: 3px; }
  </style>
</head>
<body>

  <nav class="navbar">
    <a class="nav-logo" href="#">
      <div class="nav-logo-name">Harlem <span>Spartan</span> SHOP</div>
    </a>
  </nav>

  <div class="shop-body">

    <!-- ── SECTION ROLES ── -->
    <div class="section-block">
      <div class="section-label">Roles</div>
      <div class="cards-grid" id="grid-roles"></div>
    </div>

    <hr class="section-divider">

    <!-- ── SECTION ROLE HR ── -->
    <div class="section-block">
      <div class="section-label">Role HR</div>
      <div class="cards-grid" id="grid-hr"></div>
    </div>

  </div>

  <script>
    const IMAGE = "harlem_spartan.png";

    const roles = [
      { name: "Helper",              price: 100,  robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { name: "Support",             price: 150,  robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { name: "Moderator",           price: 200,  robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { name: "Administrator",       price: 250,  robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { name: "Head Of Staff",       price: 300,  robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { name: "Head Admin",          price: 350,  robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { name: "Left Arm",            price: 400,  robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { name: "Second in Commands",  price: 450,  robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { name: "First in Commands",   price: 500,  robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { name: "Staff Management",    price: 550,  robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { name: "Right Arms",          price: 600,  robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
    ];

    const rolesHR = [
      { name: "Triple OG",    price: 1000, robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { name: "Executive",    price: 1300, robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { name: "Supervisor",   price: 1600, robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { name: "ENG Manager",  price: 2000, robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { name: "FR Manager",   price: 2000, robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { name: "War Leader",   price: 3000, robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
    ];

    function buildCards(items, gridId, isHR = false) {
      const grid = document.getElementById(gridId);
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
          <img class="item-img" src="${IMAGE}" alt="${item.name}">
          <div class="item-info">
            <div class="item-category">${isHR ? '<span class="hr-badge">HR</span> ' : ''}ROLES</div>
            <div class="item-name">${item.name}</div>
            <div class="item-price">💎 <span>${item.price} Robux</span></div>
            <div class="item-footer">
              <a class="buy-btn" href="${item.robloxLink}" target="_blank" rel="noopener">
                🛒 Buy
              </a>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    buildCards(roles, 'grid-roles', false);
    buildCards(rolesHR, 'grid-hr', true);
  </script>

</body>
</html>
