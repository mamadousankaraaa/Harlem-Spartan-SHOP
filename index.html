<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Harlem Spartan SHOP</title>
  <link rel="icon" type="image/png" href="harlem_spartan.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #0d0d1a;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: #ffffff;
      min-height: 100vh;
    }

    .navbar {
      background: #111127;
      border-bottom: 1px solid #1e1e3a;
      display: flex;
      align-items: center;
      padding: 0 32px;
      height: 65px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
    .nav-logo-name { font-size: 20px; font-weight: 800; color: #ffffff; }
    .nav-logo-name span { color: #e74c3c; }

    .shop-body { padding: 36px 32px; }

    .section-block { margin-bottom: 50px; }

    .section-label {
      font-size: 13px;
      font-weight: 800;
      color: #e74c3c;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #1e1e3a;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }

    @media (max-width: 1100px) { .cards-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 750px)  { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px)  { .cards-grid { grid-template-columns: 1fr; } }

    .item-card {
      background: #13132a;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid #1e1e3a;
      transition: border-color 0.25s, transform 0.2s;
    }

    .item-card:hover { border-color: #c0392b; transform: translateY(-3px); }

    .item-img { width: 100%; height: 160px; object-fit: cover; display: block; }

    .item-info { padding: 14px 16px 16px; }

    .item-emoji {
      font-size: 28px;
      margin-bottom: 8px;
      display: block;
    }

    .item-category {
      font-size: 11px;
      font-weight: 800;
      color: #e74c3c;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .item-name {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    .item-price {
      font-size: 14px;
      font-weight: 800;
      color: #e74c3c;
      margin-bottom: 14px;
    }

    .item-footer { display: flex; align-items: center; justify-content: flex-end; }

    .buy-btn {
      background: #c0392b;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }

    .buy-btn:hover { background: #a93226; transform: scale(1.03); }
    .buy-btn:active { transform: scale(0.97); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0d0d1a; }
    ::-webkit-scrollbar-thumb { background: #c0392b; border-radius: 3px; }
  </style>
</head>
<body>

  <nav class="navbar">
    <a class="nav-logo" href="#">
      <div class="nav-logo-name">Harlem <span>Spartan</span> SHOP</div>
    </a>
  </nav>

  <div class="shop-body">
    <div class="section-block">
      <div class="section-label">Members Roles</div>
      <div class="cards-grid" id="grid-members"></div>
    </div>

    <div class="section-block">
      <div class="section-label">Staff Roles</div>
      <div class="cards-grid" id="grid-staff"></div>
    </div>

    <div class="section-block">
      <div class="section-label">HR Roles</div>
      <div class="cards-grid" id="grid-hr"></div>
    </div>
  </div>

  <script>
    const IMAGE = "harlem_spartan.png";

    const members = [
      { emoji: "🎒", name: "Active Members",      price: "15 R$",   robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { emoji: "🪖", name: "Elite",               price: "25 R$",   robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { emoji: "🚬", name: "Gangster's",           price: "50 R$",   robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { emoji: "🗿", name: "Real Gangster's",      price: "100 R$",  robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { emoji: "⚓", name: "Original Gangster's",  price: "200 R$",  robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { emoji: "🎓", name: "Captain",              price: "350 R$",  robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { emoji: "🗽", name: "Headz Captain's",      price: "500 R$",  robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { emoji: "🤝", name: "VIP",                  price: "1 500 R$",robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
    ];

    const staff = [
      { emoji: "📄", name: "Helper",        price: "1 000 R$", robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { emoji: "🛡️", name: "Support",       price: "1 200 R$", robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { emoji: "🔨", name: "Moderator",     price: "1 500 R$", robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { emoji: "💎", name: "Administrator", price: "1 750 R$", robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { emoji: "🌪️", name: "Head Staff",    price: "2 000 R$", robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
    ];

    const hr = [
      { emoji: "🛡️", name: "Head Admin",         price: "2 000 R$", robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { emoji: "🤝", name: "Left Arm",            price: "2 100 R$", robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { emoji: "🥈", name: "Second In Command",   price: "2 300 R$", robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { emoji: "🥇", name: "First In Command",    price: "2 500 R$", robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { emoji: "📋", name: "Staff Management",    price: "2 700 R$", robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { emoji: "💪", name: "Right Arm",           price: "2 850 R$", robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
      { emoji: "👑", name: "Triple OG",           price: "3 000 R$", robloxLink: "https://www.roblox.com/game-pass/REMPLACE_ICI" },
    ];

    function buildCards(items, gridId, category) {
      const grid = document.getElementById(gridId);
      items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
          <img class="item-img" src="${IMAGE}" alt="${item.name}">
          <div class="item-info">
            <span class="item-emoji">${item.emoji}</span>
            <div class="item-category">${category}</div>
            <div class="item-name">${item.name}</div>
            <div class="item-price">${item.price}</div>
            <div class="item-footer">
              <a class="buy-btn" href="${item.robloxLink}" target="_blank" rel="noopener">
                🛒 Buy
              </a>
            </div>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    buildCards(members, 'grid-members', 'MEMBERS ROLES');
    buildCards(staff,   'grid-staff',   'STAFF ROLES');
    buildCards(hr,      'grid-hr',      'HR ROLES');
  </script>

</body>
</html>
